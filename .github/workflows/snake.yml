name: Generate Snake
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: vokrob
          outputs: |
            snake.svg
            snake.gif
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snake.svg
          git commit -m "chore: update snake.svg" || echo "No changes to commit"
          git push
