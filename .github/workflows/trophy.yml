name: Update Trophy
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Trophy via Curl
        run: |
          mkdir -p dist
          curl -o dist/trophy.svg "https://github-profile-trophy.vercel.app/?username=vokrob&theme=matrix&no-frame=true&no-bg=true&row=1&column=3"

      - name: push trophy.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
