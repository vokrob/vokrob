name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Generate Trophies Locally
        run: |
          # Скачиваем CLI генератор и запускаем его локально
          npx github-profile-trophy-cli --username=vokrob --theme=matrix --no-frame=true --no-bg=true --row=1 --column=3 --output=trophy.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin main
