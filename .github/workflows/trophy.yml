name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophy SVG with User-Agent
        run: |
          # Передаем заголовок браузера Chrome, чтобы сервер Vercel успешно отдал картинку
          curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          -s "https://vercel.app" \
          -o trophy.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trophy.svg
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Nothing to push"
