name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *' # Каждый день в полночь
  workflow_dispatch: # Возможность запустить вручную

permissions:
  contents: write # Разрешение на запись файла в ваш репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Trophies
        # Используем обновленный форк экшена, который не падает по таймаутам и ошибкам Deno
        uses: lowlighter/github-profile-trophy@master
        with:
          username: vokrob
          theme: matrix
          column: 3
          row: 1
          no-bg: true
          no-frame: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git commit -m "Update official trophies" || echo "No changes to commit"
          git push origin main
