name: Update Trophy
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          screen_name: vokrob
          # Настройки стиля
          theme: matrix
          no-frame: true
          no-bg: true
          column: 3

      # Файл автоматически создается в корне или указанной папке.
      # По умолчанию этот экшн сам может коммитить, но мы сделаем это явно.

      - name: Move and Commit
        run: |
          mkdir -p images
          # Экшн ryo-ma генерирует файл с именем по умолчанию или в папку
          # Если вы хотите сохранить его в images/trophy.svg:
          mv trophy.svg images/trophy.svg || true

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '♨ Update trophy'
          file_pattern: 'images/trophy.svg'
