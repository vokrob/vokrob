name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *' # Каждый день в полночь
  workflow_dispatch: # Чтобы запустить вручную

permissions:
  contents: write # Разрешает экшену записывать файлы в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies SVG
        run: |
          # Скачиваем SVG с нужными вам параметрами во временный файл
          curl -s "https://vercel.app" -o trophy.svg

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin main
