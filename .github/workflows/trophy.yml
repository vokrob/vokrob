name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *' # Автообновление каждый день в полночь
  workflow_dispatch: # Позволяет запускать вручную в любое время

permissions:
  contents: write

jobs:
  update-trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophy SVG directly
        run: |
          # Скачиваем SVG с официального сервера со всеми вашими идеальными параметрами оформления
          curl -s "https://vercel.app" -o trophy.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trophy.svg
          # Если трофеи не изменились, экшен завершится успешно без падения ошибки
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Nothing to push"
