name: Update Trophy
on:
  schedule:
    - cron: '0 0 * * 0' # Раз в неделю по воскресеньям
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Кэш удален, так как в корне нет package-lock.json

      - name: Generate trophy
        run: |
          # 1. Клонируем репозиторий генератора
          git clone https://github.com/lucthienphong1120/github-trophies generator
          cd generator
          
          # 2. Устанавливаем зависимости (все, включая dev)
          npm install
          
          # 3. Запускаем сборку трофея
          USERNAME=vokrob THEME=matrix ROW=1 COLUMN=3 NO_FRAME=true NO_BG=true npm run build
          
          # 4. Возвращаемся в корень и копируем результат
          cd ..
          mkdir -p images
          
          if [ -f "generator/public/vokrob.svg" ]; then
            cp generator/public/vokrob.svg images/trophy.svg
            echo "✅ Trophy generated successfully"
          else
            echo "❌ Error: File not found in generator/public/vokrob.svg"
            exit 1
          fi

      - name: Commit trophy
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '♨ Update trophy'
          file_pattern: 'images/trophy.svg'
