name: Update Trophy
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: vokrob
          theme: matrix
          # Здесь мы убрали лишние параметры, которые вызывали ошибку.
          # Сначала проверим, что он просто создаст файл.

      - name: Move and Commit
        run: |
          mkdir -p images
          # Экшн создает файл по пути github-profile-trophy.svg или похожему.
          # Попробуем найти его и переместить.
          mv *.svg images/trophy.svg || true

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '♨ Update trophy'
          file_pattern: 'images/trophy.svg'
