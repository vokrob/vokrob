name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trophy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Локально собираем SVG без отправки внешних HTTP-запросов к Vercel
      - name: Generate SVG Locally
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Скачиваем и запускаем генератор через npx напрямую из репозитория проекта
          npx github-profile-trophy --username=vokrob --theme=matrix --no-frame=true --no-bg=true --row=1 --column=3 --output=trophy.svg

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trophy.svg
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Nothing to push"
