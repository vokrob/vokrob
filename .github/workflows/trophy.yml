name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies SVG
        run: |
          # Используем официальный резервный домен и флаг -f, чтобы падать при ошибках сервера
          curl -f -s "https://vercel.app" -o trophy.svg

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git commit -m "Update trophies" || echo "No changes to commit"
          git push origin main
