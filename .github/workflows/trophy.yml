name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *' # Каждый день в полночь
  workflow_dispatch: # Чтобы запустить вручную

permissions:
  contents: write # Разрешает экшену записывать файлы в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophies SVG
        run: |
          # Скачиваем SVG с основного рабочего сервера
          curl -sL "https://vercel.app" -o trophy.svg
          
          # Проверяем размер: если Vercel отдал ошибку (меньше 200 байт), 
          # то подкладываем запасную ссылку с другого живого зеркала
          if [ $(stat -c%s "trophy.svg") -lt 200 ]; then
            curl -sL "https://vercel.app" -o trophy.svg
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Принудительно добавляем и коммитим файл, обходя любые проверки
          git add -A trophy.svg
          git commit -m "Update trophies (forced)" || echo "No changes to commit"
          git push origin main
