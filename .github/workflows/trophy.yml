name: Update Trophies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and Commit Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: vokrob
          theme: matrix
          column: 3
          row: 1
          no-bg: true
          no-frame: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
