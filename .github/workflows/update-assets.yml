name: Update Profile Assets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: vokrob
          outputs: |
            snake.svg

      - name: Validate SVG
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout snake.svg

      - uses: actions/upload-artifact@v7
        with:
          name: snake
          path: snake.svg
          if-no-files-found: error

  trophies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Fetch Trophies SVG
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o trophies.svg \
            "https://github-profile-trophy-nu.vercel.app/?username=vokrob&theme=matrix&no-frame=true&no-bg=true&row=1&column=3"

      - name: Validate SVG
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout trophies.svg

      - uses: actions/upload-artifact@v7
        with:
          name: trophies
          path: trophies.svg
          if-no-files-found: error

  codestats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Fetch Code::Stats Graph
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o codestats.svg \
            "https://codestats-readme.wegfan.cn/history-graph/vokrob?history_days=30&max_languages=15"

      - name: Validate SVG
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout codestats.svg

      - uses: actions/upload-artifact@v7
        with:
          name: codestats
          path: codestats.svg
          if-no-files-found: error

  badges:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Fetch Typing SVG
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o typing.svg \
            "https://readme-typing-svg.herokuapp.com/?font=Fira+Code&color=00FF00&background=FFFFFF00&lines=Welcome+to+my+profile;My+name+is+Danil+Borkov;I+am+a+DevOps+engineer&center=true"

      - name: Validate Typing SVG
        run: xmllint --noout typing.svg

      - name: Fetch WakaTime Badge
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o wakatime.svg \
            "https://wakatime.com/badge/user/c2eea5ba-3079-4fa5-8d83-15f10e89cc66.svg?color=178600"

      - name: Validate WakaTime SVG
        run: xmllint --noout wakatime.svg

      - name: Fetch Profile Views Badge
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o views.svg \
            "https://komarev.com/ghpvc/?username=vokrob&color=178600"

      - name: Validate Views SVG
        run: xmllint --noout views.svg

      - uses: actions/upload-artifact@v7
        with:
          name: badges
          path: |
            typing.svg
            wakatime.svg
            views.svg
          if-no-files-found: error

  commit:
    needs: [snake, trophies, codestats, badges]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage Assets
        run: |
          cp -f artifacts/snake.svg .
          cp -f artifacts/trophies.svg .
          cp -f artifacts/codestats.svg .
          cp -f artifacts/typing.svg .
          cp -f artifacts/wakatime.svg .
          cp -f artifacts/views.svg .
          rm -rf artifacts

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update profile assets'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          file_pattern: 'snake.svg trophies.svg codestats.svg typing.svg wakatime.svg views.svg'
