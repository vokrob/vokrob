name: Update Profile Assets

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Generate Contribution Snake
        continue-on-error: true
        uses: Platane/snk@v3
        with:
          github_user_name: vokrob
          outputs: snake.svg?palette=github-dark

      - name: Validate SVG
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout snake.svg

      - uses: actions/upload-artifact@v7
        with:
          name: snake
          path: snake.svg
          if-no-files-found: warn

  trophies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Fetch Trophies SVG
        continue-on-error: true
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o trophies.svg \
            "https://github-profile-trophy-nu.vercel.app/?username=vokrob&theme=matrix&no-frame=true&no-bg=true&row=1&column=3&title=Followers,Stars,Experience&_=$(date +%s)"

      - name: Validate SVG
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout trophies.svg

      - uses: actions/upload-artifact@v7
        with:
          name: trophies
          path: trophies.svg
          if-no-files-found: warn

  codestats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Fetch Code::Stats Graph
        continue-on-error: true
        run: |
          curl -sfSL --retry 3 --retry-delay 5 -o codestats.svg \
            "https://codestats-readme.wegfan.cn/history-graph/vokrob?history_days=30&max_languages=15"

      - name: Apply Dark Theme
        continue-on-error: true
        run: |
          sed -i \
            -e 's/#fff/#0d1117/g' \
            -e 's/#e8e8e8/#0f4d00/g' \
            -e 's/#ababab/#178600/g' \
            -e 's/#666/#178600/g' \
            codestats.svg

      - name: Validate Dark Theme Applied
        continue-on-error: true
        run: |
          if grep -qiE '#fff|#e8e8e8|#f0f0f0|#f5f5f5' codestats.svg; then
            echo "::warning::Dark theme may not have applied fully"
          fi

      - name: Validate SVG
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout codestats.svg

      - uses: actions/upload-artifact@v7
        with:
          name: codestats
          path: codestats.svg
          if-no-files-found: warn

  badges:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install xmllint
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Fetch Typing SVG
        continue-on-error: true
        run: |
          curl -sfSL --retry 5 --retry-delay 10 --max-time 60 -o typing.svg \
            "https://readme-typing-svg.herokuapp.com/?font=Fira+Code&color=00FF00&background=FFFFFF00&lines=Welcome+to+my+profile;My+name+is+Danil+Borkov;I+am+a+DevOps+engineer&center=true"
          xmllint --noout typing.svg

      - name: Fetch WakaTime Badge
        continue-on-error: true
        run: |
          curl -sfSL --retry 3 --retry-delay 5 --max-time 30 -o wakatime.svg \
            "https://wakatime.com/badge/user/c2eea5ba-3079-4fa5-8d83-15f10e89cc66.svg?color=178600&_=$(date +%s)"
          xmllint --noout wakatime.svg

      - uses: actions/upload-artifact@v7
        with:
          name: badges
          path: |
            typing.svg
            wakatime.svg
          if-no-files-found: warn

  commit:
    needs: [snake, trophies, codestats, badges]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage Assets
        run: |
          for f in snake trophies codestats typing wakatime; do
            [ -f "artifacts/$f.svg" ] && cp -f "artifacts/$f.svg" .
          done
          rm -rf artifacts

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update profile assets'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          file_pattern: 'snake.svg trophies.svg codestats.svg typing.svg wakatime.svg'
